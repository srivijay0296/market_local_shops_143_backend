spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/market_local_shops
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

cors:
  allowed-origins: ${CORS_ORIGINS}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

spring.rabbitmq:
  host: ${SPRING_RABBITMQ_HOST:rabbitmq}
  port: ${SPRING_RABBITMQ_PORT:5672}
  username: ${SPRING_RABBITMQ_USERNAME:guest}
  password: ${SPRING_RABBITMQ_PASSWORD:guest}
  listener:
    simple:
      acknowledge-mode: manual
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 5

spring.kafka:
  bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
  listener:
    auto-startup: false

messaging:
  rabbitmq:
    enabled: true
  kafka:
    enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
